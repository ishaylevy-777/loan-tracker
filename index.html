<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מעקב הלוואה</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0f1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-header">
                <div class="login-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <h1>מעקב הלוואה</h1>
                <p>התחבר כדי להמשיך</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username">שם משתמש</label>
                    <input type="text" id="username" autocomplete="username" required>
                </div>
                <div class="input-group">
                    <label for="password">סיסמה</label>
                    <input type="password" id="password" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="error-msg hidden"></div>
                <button type="submit" class="btn btn-primary btn-full">כניסה</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="appScreen" class="screen">
        <!-- Header -->
        <header class="app-header">
            <div class="header-top">
                <h2>מעקב הלוואה</h2>
                <div class="header-actions">
                    <span id="currentUser" class="user-badge"></span>
                    <button id="logoutBtn" class="btn-icon" title="יציאה">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-section">
            <div class="stat-card stat-total">
                <div class="stat-label">סכום ההלוואה</div>
                <div class="stat-value" id="statTotal">₪0</div>
                <div class="stat-sub" id="editLoanBtn" style="display:none;">
                    <button class="btn-link">שנה סכום</button>
                </div>
            </div>
            <div class="stats-row">
                <div class="stat-card stat-paid">
                    <div class="stat-label">שולם</div>
                    <div class="stat-value" id="statPaid">₪0</div>
                </div>
                <div class="stat-card stat-remaining">
                    <div class="stat-label">נשאר</div>
                    <div class="stat-value" id="statRemaining">₪0</div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <div class="stats-row">
                <div class="stat-card stat-small">
                    <div class="stat-label">מספר תשלומים</div>
                    <div class="stat-value" id="statCount">0</div>
                </div>
                <div class="stat-card stat-small">
                    <div class="stat-label">תשלום אחרון</div>
                    <div class="stat-value stat-value-sm" id="statLast">-</div>
                </div>
            </div>
        </div>

        <!-- Payments List -->
        <div class="payments-section">
            <div class="section-header">
                <h3>היסטוריית תשלומים</h3>
                <button id="addPaymentBtn" class="btn btn-primary btn-sm" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    תשלום חדש
                </button>
            </div>
            <div id="paymentsList" class="payments-list">
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="2" y1="10" x2="22" y2="10"/>
                    </svg>
                    <p>אין תשלומים עדיין</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">תשלום חדש</h3>
                <button class="btn-icon modal-close" id="modalCloseBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="paymentForm">
                <input type="hidden" id="paymentId">
                <div class="input-group">
                    <label for="paymentAmount">סכום (₪)</label>
                    <input type="number" id="paymentAmount" step="0.01" min="0" required>
                </div>
                <div class="input-group">
                    <label for="paymentDate">תאריך</label>
                    <input type="date" id="paymentDate" required>
                </div>
                <div class="input-group">
                    <label for="paymentNote">הערה (אופציונלי)</label>
                    <input type="text" id="paymentNote">
                </div>
                <div class="input-group">
                    <label>אישור העברה (אופציונלי)</label>
                    <div class="file-upload" id="fileUploadArea">
                        <input type="file" id="paymentImage" accept="image/*" capture="environment">
                        <div class="file-upload-content" id="fileUploadContent">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>לחץ להעלאת תמונה</span>
                        </div>
                        <div class="file-preview hidden" id="filePreview">
                            <img id="previewImg" src="" alt="תצוגה מקדימה">
                            <button type="button" class="btn-remove-img" id="removeImgBtn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="modalCancelBtn">ביטול</button>
                    <button type="submit" class="btn btn-primary">שמור</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Loan Modal -->
    <div id="loanModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>שינוי סכום הלוואה</h3>
                <button class="btn-icon modal-close" id="loanModalCloseBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="loanForm">
                <div class="input-group">
                    <label for="loanAmount">סכום ההלוואה (₪)</label>
                    <input type="number" id="loanAmount" step="1" min="0" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="loanCancelBtn">ביטול</button>
                    <button type="submit" class="btn btn-primary">שמור</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="imageModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="image-viewer">
            <button class="btn-icon image-close" id="imageCloseBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <img id="imageViewerImg" src="" alt="אישור העברה">
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="deleteModal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>מחיקת תשלום</h3>
            </div>
            <p class="delete-msg">האם אתה בטוח שברצונך למחוק תשלום זה?</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="deleteCancelBtn">ביטול</button>
                <button class="btn btn-danger" id="deleteConfirmBtn">מחק</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
